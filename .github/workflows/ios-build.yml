name: iOS Build Generation

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Xcode version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'

    - name: Build App Specification
      run: |
        xcodebuild -project iOSStore/iOSStore.xcodeproj -scheme iOSStore -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO COMPILER_INDEX_STORE_ENABLE=NO

    - name: Create IPA Package
      run: |
        # أسلوب ذكي للبحث عن ملف الـ .app وضغطه أينما وجد داخل مجلد الـ Build
        mkdir -p build/Payload
        APP_PATH=$(find build -name "*.app" | head -n 1)
        if [ -z "$APP_PATH" ]; then
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -n 1)
        fi
        echo "Found App at: $APP_PATH"
        cp -R "$APP_PATH" build/Payload/
        cd build && zip -r iOSStore.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: iOSStore-Production-IPA
        path: build/iOSStore.ipa
